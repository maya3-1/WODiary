<style>
  :root{
    --header:#4A3A26;
    --appbg:#FAF2E3;
    --card:#FFFBF1;
    --ink:#4A3A26;
    --accent:#EFC2CD;
    /* A soft secondary pastel — pale mint — threading gentle colour through the app. */
    --pop:#A9D4C0;
    /* Fallback first for browsers without color-mix(); the modern value overrides it */
    --surface:#F3EADC;
    --surface:color-mix(in srgb, var(--card) 55%, var(--appbg));
    --navbg:var(--appbg);
  }
  html{
    background:var(--appbg);
    overscroll-behavior-y:none;
  }
  html.dark-engine{
    --appbg:#211A11;
    --card:#2D2517;
    --header:#F6EBD8;
    --pop:#A7D3BE;
  }
  html.dark-engine body{ color:#F6EBD8; }
  html.dark-engine .ink-text{ color:#F6EBD8 !important; }
  html.dark-engine .text-neutral-900{ color:#F6EBD8 !important; }
  body{
    background-color:var(--appbg);
    font-family:'Poppins',sans-serif;
    font-weight:400;
    color:#4A3A26;
    -webkit-tap-highlight-color:transparent;
    min-height:100vh;
    min-height:100dvh;
    overscroll-behavior-y:none;
  }
  .display{ font-family:'Bricolage Grotesque','Poppins',sans-serif; letter-spacing:-.02em; }
  .hero-num{ font-weight:800; letter-spacing:-.035em; }
  .text-neutral-900{ color:var(--ink) !important; }
  .font-extrabold{ font-weight:700 !important; }
  .font-bold{ font-weight:600 !important; }
  .card{
    background:var(--card);
    border:1px solid color-mix(in srgb, var(--ink) 8%, transparent);
    border-radius:1.6rem;
    box-shadow:
      0 1px 0 0 color-mix(in srgb, #fff 55%, transparent) inset,
      0 2px 6px -2px color-mix(in srgb, var(--ink) 22%, transparent),
      0 22px 40px -26px color-mix(in srgb, var(--ink) 60%, transparent);
  }
  .card-blob{
    background:var(--card);
    border:1px solid color-mix(in srgb, var(--ink) 8%, transparent);
    border-radius:1.6rem;
    box-shadow:
      0 1px 0 0 color-mix(in srgb, #fff 55%, transparent) inset,
      0 2px 6px -2px color-mix(in srgb, var(--ink) 22%, transparent),
      0 22px 40px -26px color-mix(in srgb, var(--ink) 60%, transparent);
  }
  .pill{
    border:1px solid color-mix(in srgb, var(--ink) 12%, transparent);
    border-radius:9999px;
    box-shadow:0 6px 14px -10px color-mix(in srgb, var(--ink) 40%, transparent);
  }
  .btn-accent{
    background:var(--accent);
    border:none;
    border-radius:9999px;
    box-shadow:0 10px 20px -12px color-mix(in srgb, var(--accent) 70%, var(--ink));
    transition:transform .1s ease, box-shadow .1s ease, filter .1s ease;
  }
  .btn-accent:active{ transform:translateY(2px); filter:brightness(.96); box-shadow:0 4px 10px -8px color-mix(in srgb, var(--accent) 70%, var(--ink)); }
  .field{
    width:100%;
    max-width:100%;
    display:block;
    background:var(--surface);
    border:1px solid color-mix(in srgb, var(--ink) 10%, transparent);
    border-radius:1.1rem;
    padding:.85rem 1.05rem;
    font-weight:500;
    color:inherit;
    outline:none;
  }
  .field:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 35%, transparent);
  }
  select.field{
    -webkit-appearance:none; appearance:none;
    background-image:url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234A3A26' stroke-width='2' stroke-linecap='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
    background-repeat:no-repeat;
    background-position:right .7rem center;
    background-size:1rem;
    padding-right:2rem;
  }
  input[type="date"].field{
    -webkit-appearance:none; appearance:none;
    min-width:0; width:100%; max-width:100%;
    box-sizing:border-box; text-align:left;
    min-height:3.1rem;
  }
  input[type="date"].field::-webkit-date-and-time-value{ text-align:left; margin:0; }
  .tag{
    border:none;
    border-radius:9999px;
    font-weight:500;
    padding:.22rem .8rem;
    font-size:.72rem;
    display:inline-block;
  }
  .sticky-row{
    border:none;
    box-shadow:none;
    border-radius:1.05rem;
  }
  .del-meal, .del-workout, .del-pr, .del-task, .del-supp{
    background:transparent !important;
    border:none !important;
    box-shadow:none !important;
    opacity:.5;
  }
  .nav-active{ background:var(--accent); }
  .header-ink{ color:var(--header); }
  input[type="color"]{
    -webkit-appearance:none; appearance:none;
    width:3.25rem; height:2.5rem; padding:0;
    border:1px solid color-mix(in srgb, var(--ink) 15%, transparent);
    border-radius:.8rem;
    background:transparent;
    box-shadow:0 5px 10px -8px color-mix(in srgb, var(--ink) 40%, transparent);
  }
  input[type="color"]::-webkit-color-swatch-wrapper{ padding:2px; }
  input[type="color"]::-webkit-color-swatch{ border:none; border-radius:.55rem; }
  input[type="checkbox"].chunky{
    -webkit-appearance:none; appearance:none;
    width:1.55rem; height:1.55rem; flex-shrink:0;
    border:1.5px solid color-mix(in srgb, var(--ink) 35%, transparent);
    border-radius:.55rem;
    background:var(--card); display:inline-grid; place-content:center;
    cursor:pointer;
  }
  input[type="checkbox"].chunky:checked{ background:var(--accent); border-color:var(--accent); }
  input[type="checkbox"].chunky:checked::after{
    content:"✓"; font-weight:600; color:var(--ink); font-size:.95rem; line-height:1;
  }
  .safe-nav{ padding-bottom:calc(0.15rem + env(safe-area-inset-bottom)); }
  ::placeholder{ color:#B5A488; font-weight:400; }
  main h1.display{ font-size:1.45rem; line-height:1.15; letter-spacing:-.02em; }
  main header p.display{ font-size:.82rem; font-weight:500; opacity:.55; }
  main header{ margin-bottom:1.1rem !important; }
  main h2.display{
    font-size:.72rem;
    font-weight:600;
    letter-spacing:.09em;
    text-transform:uppercase;
    opacity:.55;
  }
  section.card, section.card-blob{ position:relative; overflow:hidden; }
  .deco-scatter{ position:absolute; pointer-events:none; inset:0; }
  .deco-scatter svg{ position:absolute; }
  .deco-s1{ top:12px; right:16px; width:18px; height:18px; opacity:.5; }
  .deco-s2{ top:44px; right:40px; width:11px; height:11px; opacity:.38; }
  .deco-s3{ bottom:22px; right:24px; width:13px; height:13px; opacity:.4; }
  .deco-s4{ top:70px; right:14px; width:8px; height:8px; opacity:.32; }
  .deco-c1{ fill:#E9A0B0; }
  .deco-c2{ fill:#B7A4D9; }
  .deco-c3{ fill:var(--accent); }
  .deco-c4{ fill:#8FBF9F; }
  .card svg.w-5, .card-blob svg.w-5{ width:1.05rem; height:1.05rem; }
  .card, .card-blob{ padding:1.5rem !important; }
  main section{ margin-bottom:1.15rem !important; }
  /* Cards containing a form read as "input" surfaces */
  main section:has(form){
    background:color-mix(in srgb, var(--card) 88%, var(--accent));
  }
  button.btn-accent, label.btn-accent{ padding-top:.7rem !important; padding-bottom:.7rem !important; font-size:.92rem; }

  /* ---------- Native-app feel ---------- */
  body{
    -webkit-user-select:none; user-select:none;
    -webkit-touch-callout:none;
    -webkit-overflow-scrolling:touch;
  }
  input, textarea{ -webkit-user-select:text; user-select:text; }

  @keyframes cardIn{
    from{ opacity:0; transform:translateY(14px) scale(.985); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }
  /* Entrance animation runs only on a real view change, not on every re-render */
  main.view-enter header{ animation:cardIn .38s cubic-bezier(.22,1,.36,1) both; }
  main.view-enter section{ animation:cardIn .42s cubic-bezier(.22,1,.36,1) both; }
  main.view-enter section:nth-of-type(1){ animation-delay:.03s; }
  main.view-enter section:nth-of-type(2){ animation-delay:.08s; }
  main.view-enter section:nth-of-type(3){ animation-delay:.13s; }
  main.view-enter section:nth-of-type(4){ animation-delay:.18s; }
  main.view-enter section:nth-of-type(5){ animation-delay:.22s; }
  main.view-enter section:nth-of-type(n+6){ animation-delay:.26s; }

  button, .pill{
    transition:transform .12s cubic-bezier(.4,0,.2,1), filter .12s ease, background .25s ease;
  }
  button:active, .pill:active{ transform:scale(.955); }
  .btn-accent:active{ transform:scale(.955) translateY(1px); }

  #navbar button{ transition:transform .2s cubic-bezier(.34,1.56,.64,1), background .28s ease; }
  #navbar button:active{ transform:scale(.9); }

  @keyframes rowIn{ from{ opacity:0; transform:translateX(-6px); } to{ opacity:1; transform:translateX(0); } }
  main.view-enter .sticky-row{ animation:rowIn .3s ease both; }

  @media (prefers-reduced-motion: reduce){
    main.view-enter section, main.view-enter header, main.view-enter .sticky-row{ animation:none !important; }
    button:active, .pill:active, #navbar button:active{ transform:none; }
  }

  /* ---------- Toast ---------- */
  #toast{
    position:fixed;
    left:50%;
    bottom:calc(5.2rem + env(safe-area-inset-bottom));
    transform:translateX(-50%) translateY(20px);
    z-index:100;
    display:flex; align-items:center; gap:.5rem;
    padding:.7rem 1.1rem;
    border-radius:9999px;
    background:var(--ink);
    color:var(--card);
    font-weight:600;
    font-size:.85rem;
    box-shadow:0 12px 30px -10px rgba(0,0,0,.4);
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease, transform .35s cubic-bezier(.34,1.56,.64,1);
    white-space:nowrap;
    max-width:90vw;
  }
  #toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }
  #toast svg{ width:1rem; height:1rem; flex-shrink:0; }

  /* ---------- Visual polish ---------- */

  /* Soft ambient gradient behind everything — depth without noise */
  body::before{
    content:"";
    position:fixed; inset:0;
    pointer-events:none; z-index:-1;
    background:
      radial-gradient(ellipse 80% 50% at 50% -8%, color-mix(in srgb, var(--accent) 16%, transparent), transparent 65%),
      radial-gradient(ellipse 60% 40% at 100% 100%, color-mix(in srgb, var(--accent) 9%, transparent), transparent 60%);
  }

  /* Hero numbers get a subtle vertical gradient — richer than flat ink */
  .hero-num{
    font-family:'Bricolage Grotesque', sans-serif;
    font-weight:600;
    font-variation-settings:'opsz' 40;
    letter-spacing:-.03em;
    background:linear-gradient(175deg, var(--ink) 0%, color-mix(in srgb, var(--ink) 68%, var(--accent)) 100%);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  /* Page titles: bold, characterful grotesque */
  main h1.display{
    font-family:'Bricolage Grotesque', sans-serif;
    font-weight:700;
    font-variation-settings:'opsz' 48;
    letter-spacing:-.025em;
    font-size:1.7rem;
  }
  main header h1.display{ font-size:1.9rem; line-height:1.12; }

  /* Cards: layered shadow for real depth */
  .card, .card-blob{
    box-shadow:
      0 1px 2px -1px color-mix(in srgb, var(--ink) 12%, transparent),
      0 8px 20px -14px color-mix(in srgb, var(--ink) 45%, transparent),
      0 24px 48px -32px color-mix(in srgb, var(--ink) 55%, transparent);
  }

  /* Tags: soft inner highlight so they feel like objects, not stickers */
  .tag{
    box-shadow:inset 0 1px 0 rgba(255,255,255,.35);
  }

  /* Accent button: gentle gradient + glow */
  .btn-accent{
    background:linear-gradient(180deg,
      color-mix(in srgb, var(--accent) 92%, white) 0%,
      var(--accent) 100%);
    box-shadow:
      0 1px 2px rgba(0,0,0,.06),
      0 8px 18px -10px color-mix(in srgb, var(--accent) 75%, var(--ink));
  }

  /* Nav bar: frosted glass */
  nav{
    backdrop-filter:blur(14px) saturate(1.3);
    -webkit-backdrop-filter:blur(14px) saturate(1.3);
    background:color-mix(in srgb, var(--navbg) 82%, transparent) !important;
  }

  /* A ring that hits its target pulses once, then rests */
  @keyframes ringDone{
    0%{ transform:scale(1); }
    35%{ transform:scale(1.09); }
    70%{ transform:scale(.98); }
    100%{ transform:scale(1); }
  }
  .ring-done{ animation:ringDone .7s cubic-bezier(.34,1.56,.64,1) 1; }
  .ring-done .ring-pct{ font-weight:700; }

  /* Focus ring feels intentional */
  .field:focus{
    box-shadow:0 0 0 3.5px color-mix(in srgb, var(--accent) 32%, transparent);
  }

  /* Collapsible macro helper */
  details.macro-helper summary{ list-style:none; }
  details.macro-helper summary::-webkit-details-marker{ display:none; }
  details.macro-helper summary::marker{ content:''; }
  .macro-chev{ transition:transform .22s ease; }
  details.macro-helper[open] .macro-chev{ transform:rotate(180deg); }

  /* Dark mode: on accent-coloured surfaces (which stay light), keep text & icons dark
     so buttons, selected pills and the "today" row read correctly. Icons and
     var(--ink) details elsewhere become light via the --ink remap in applyTheme. */
  html.dark-engine [style*="background:var(--accent)"],
  html.dark-engine [style*="background:var(--accent)"] .ink-text,
  html.dark-engine [style*="background:var(--accent)"] .text-neutral-900,
  html.dark-engine .btn-accent,
  html.dark-engine .btn-accent .ink-text,
  html.dark-engine .btn-accent .text-neutral-900{ color:#3A2E1E !important; }
  html.dark-engine [style*="background:var(--accent)"] svg.lucide,
  html.dark-engine .btn-accent svg.lucide{ color:#3A2E1E !important; }
</style>
</head>
<body>

<div class="fixed top-0 left-0 right-0 z-40" style="height:env(safe-area-inset-top); background:var(--appbg);"></div>

<main id="view" class="w-full max-w-md mx-auto px-4" style="padding-top:calc(1.25rem + env(safe-area-inset-top)); padding-bottom:calc(4.5rem + env(safe-area-inset-bottom));"></main>

<div id="toast"></div>

<nav class="fixed bottom-0 left-0 right-0 z-50 safe-nav pt-1 px-2" style="background:var(--navbg); border-top:1px solid color-mix(in srgb, var(--ink) 10%, transparent); box-shadow:0 -8px 24px -18px color-mix(in srgb, var(--ink) 60%, transparent);">
  <div id="navbar" class="w-full max-w-md mx-auto flex flex-row justify-between items-center gap-1"></div>
</nav>

<script>
document.addEventListener('DOMContentLoaded', function(){

/* ============ STATE & PERSISTENCE ============ */
const STORAGE_KEY = 'personal_fitness_dashboard_data';

const DEFAULT_THEME = {
  header:'#4E4658', appbg:'#F9F6FB', card:'#FFFEFF', ink:'#4E4658', accent:'#EFC2CD',
  surface:'', nav:'', dark:false
};
const PRESETS = [
  { name:'Petal',    header:'#4E4658', appbg:'#F9F6FB', card:'#FFFEFF', ink:'#4E4658', accent:'#EFC2CD' },
  { name:'Mint',     header:'#3E514A', appbg:'#F3F9F5', card:'#FBFFFD', ink:'#43564F', accent:'#B4DBC8' },
  { name:'Lavender', header:'#453E58', appbg:'#F6F3FC', card:'#FDFCFF', ink:'#4E4664', accent:'#CFC0E6' },
  { name:'Sky',      header:'#37454F', appbg:'#F1F6FA', card:'#FAFDFF', ink:'#3E505F', accent:'#B4D3E8' },
  { name:'Peach',    header:'#4E3A30', appbg:'#FDF5F0', card:'#FFFBF8', ink:'#5A463C', accent:'#F6C9B2' },
  { name:'Honey',    header:'#4A3A26', appbg:'#FAF2E3', card:'#FFFBF1', ink:'#4A3A26', accent:'#F2C46D' }
];
const LEGACY_THEMES = [
  { header:'#1A1A1A', appbg:'#FFF4E3', card:'#FFFDF7', ink:'#1A1A1A', accent:'#FFD166' },
  { header:'#40362F', appbg:'#F6F1EA', card:'#FFFDF9', ink:'#40362F', accent:'#D4A5A5' },
  // Every superseded default upgrades to the current pastel Petal look.
  { header:'#4A3A26', appbg:'#FAF2E3', card:'#FFFBF1', ink:'#4A3A26', accent:'#F2C46D' }, // old honey
  { header:'#241A12', appbg:'#FBF4E6', card:'#FFFDF8', ink:'#241A12', accent:'#F5A63D' }, // ember
  { header:'#463E4C', appbg:'#F7F3F8', card:'#FEFCFE', ink:'#463E4C', accent:'#E8A9B7' }, // bloom
  { header:'#3A3126', appbg:'#FAF6EE', card:'#FFFEFB', ink:'#3A3126', accent:'#DDAE59' }  // gilded (gold)
];
function migrateTheme(){
  LEGACY_THEMES.forEach(legacy=>{
    Object.keys(legacy).forEach(k=>{
      if(String(state.theme[k]||'').toUpperCase() === legacy[k].toUpperCase()){
        state.theme[k] = DEFAULT_THEME[k];
      }
    });
  });
}

let state = {
  meals: {},            // { 'YYYY-MM-DD': [ {id,name,cal,p,c,f} ] }
  water: {},            // { 'YYYY-MM-DD': totalMl }
  waterLog: {},         // { 'YYYY-MM-DD': [ml, ml, ...] } — enables Undo
  workouts: [],         // [ {id,date,type,...} ]
  prs: [],              // [ {id,cat,name,value,date} ]
  tasks: [],            // [ {id,category,text,done} ]
  taskColors: {},       // { categoryName: hex }
  supplements: { list: [], checked: {} }, // checked: { date: { name:true } }
  targets: { calories:2200, protein:140, carbs:230, fat:70, water:2500 },
  theme: Object.assign({}, DEFAULT_THEME)
};

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      state = Object.assign({}, state, parsed);
      state.theme = Object.assign({}, DEFAULT_THEME, parsed.theme || {});
      migrateTheme();
      state.targets = Object.assign({}, {calories:2200,protein:140,carbs:230,fat:70,water:2500}, parsed.targets || {});
      state.supplements = Object.assign({ list:[], checked:{} }, parsed.supplements || {});
      // Prune supplement check history older than 90 days — it's only needed for today
      const cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - 90);
      const cutoffKey = keyOf(cutoff);
      Object.keys(state.supplements.checked).forEach(k=>{
        if(k < cutoffKey) delete state.supplements.checked[k];
      });
      state.taskColors = Object.assign({}, parsed.taskColors || {});
      state.waterLog = Object.assign({}, parsed.waterLog || {});
    }
  }catch(e){ console.error('State load failed', e); }
}
function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

/* ============ HELPERS ============ */
/* Guarded icon hydration: never throws, retries until the Lucide
   library is available, so icons can never silently vanish. */
let iconRetryTimer = null;
function refreshIcons(){
  if(window.lucide && typeof window.lucide.createIcons === 'function'){
    window.lucide.createIcons();
    if(iconRetryTimer){ clearInterval(iconRetryTimer); iconRetryTimer = null; }
  }else if(!iconRetryTimer){
    iconRetryTimer = setInterval(()=>{
      if(window.lucide && typeof window.lucide.createIcons === 'function'){
        window.lucide.createIcons();
        clearInterval(iconRetryTimer); iconRetryTimer = null;
      }
    }, 300);
  }
}
window.__refreshIcons = refreshIcons;
window.addEventListener('load', refreshIcons);

// Haptic feedback — makes taps feel physical, like a native app
function haptic(pattern){
  if(navigator.vibrate) {
    try { navigator.vibrate(pattern); } catch(e) {}
  }
}

// Hero numbers count up on render — but only when the value actually changed,
// so unrelated re-renders (ticking a task) don't re-trigger the animation.
const lastCounterValues = new Map();
// Track which rings are already complete so the "done" bounce fires once, on the
// transition to 100% — not on every re-render while it sits at 100%.
const completedRings = new Map();
function animateCounters(){
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  document.querySelectorAll('.hero-num').forEach((el, i)=>{
    const raw = el.textContent.replace(/,/g, '').trim();
    const target = Number(raw);
    if(!isFinite(target)) return;

    // Identify this counter by its position and its card, so values are tracked per-slot
    const key = (activeTab || '') + ':' + i;
    const prev = lastCounterValues.get(key);
    lastCounterValues.set(key, target);

    // Nothing to animate: same value as last render, or reduced-motion
    if(reduce || prev === target){
      el.textContent = target.toLocaleString('en-US');
      return;
    }

    // Animate from the previous value (or 0 on first appearance) to the target,
    // so an increase counts up and a decrease counts down — never a flash to 0.
    const from = (typeof prev === 'number' && isFinite(prev)) ? prev : 0;
    const duration = 700;
    const start = performance.now();
    const tick = (t) => {
      const p = Math.min(1, (t - start) / duration);
      const eased = 1 - Math.pow(1 - p, 3);
      el.textContent = Math.round(from + (target - from) * eased).toLocaleString('en-US');
      if(p < 1) requestAnimationFrame(tick);
      else el.textContent = target.toLocaleString('en-US');
    };
    requestAnimationFrame(tick);
  });
}

// Confetti burst — pure canvas, no dependencies. Fires on a new record.
function confetti(){
  if(window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const cv = document.createElement('canvas');
  cv.style.cssText = 'position:fixed; inset:0; pointer-events:none; z-index:200;';
  cv.width = window.innerWidth; cv.height = window.innerHeight;
  document.body.appendChild(cv);
  const ctx = cv.getContext('2d');
  const colors = ['#E9A0B0', '#B7A4D9', '#F2C46D', '#8FBF9F', '#F5D3BD'];
  const parts = Array.from({length: 90}, ()=>({
    x: cv.width / 2 + (Math.random() - .5) * 120,
    y: cv.height * .38,
    vx: (Math.random() - .5) * 9,
    vy: Math.random() * -11 - 3,
    size: Math.random() * 7 + 4,
    color: colors[Math.floor(Math.random() * colors.length)],
    rot: Math.random() * Math.PI,
    vr: (Math.random() - .5) * .25
  }));
  let frame = 0;
  const draw = () => {
    ctx.clearRect(0, 0, cv.width, cv.height);
    parts.forEach(p=>{
      p.vy += .32;          // gravity
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.vr;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.globalAlpha = Math.max(0, 1 - frame / 110);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * .62);
      ctx.restore();
    });
    frame++;
    if(frame < 115) requestAnimationFrame(draw);
    else cv.remove();
  };
  requestAnimationFrame(draw);
}

// Two-step delete: the first tap arms the button, the second confirms.
// Auto-disarms after 3s so nothing stays dangerous.
function armDelete(btn, onConfirm){
  if(btn.dataset.armed === '1'){
    onConfirm();
    return;
  }
  btn.dataset.armed = '1';
  const original = btn.innerHTML;
  const bg = btn.style.background;
  btn.style.background = '#E9A0B0';
  btn.innerHTML = '<span style="font-size:.6rem; font-weight:700; color:#4A3A26; padding:0 .2rem;">Sure?</span>';
  haptic(20);
  setTimeout(()=>{
    if(!btn.isConnected) return;
    btn.dataset.armed = '0';
    btn.style.background = bg;
    btn.innerHTML = original;
    refreshIcons();
  }, 3000);
}

// Floating confirmation toast — immediate feedback for every save
let toastTimer = null;
function toast(message, icon = 'check'){
  const el = document.getElementById('toast');
  if(!el) return;
  el.innerHTML = `<i data-lucide="${icon}"></i><span>${escapeHtml(message)}</span>`;
  refreshIcons();
  el.classList.add('show');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ el.classList.remove('show'); }, 2100);
}
// Light tick on every button press across the whole app
document.addEventListener('click', (e)=>{
  if(e.target.closest('button, .pill, input[type="checkbox"]')) haptic(8);
}, true);

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function fmt(n){
  const num = Number(n);
  // Guard against NaN and Infinity, which would print as "NaN" or "∞"
  const safe = Number.isFinite(num) ? num : 0;
  return safe.toLocaleString('en-US', { maximumFractionDigits: 1 });
}
function parseNum(v){
  const cleaned = String(v ?? '').replace(/[,\s]/g,'');
  const num = Number(cleaned);
  // Reject NaN, Infinity, and negatives — a negative calorie or weight would
  // silently corrupt every total that sums these values.
  if(!Number.isFinite(num) || num < 0) return 0;
  return num;
}
function todayKey(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function escapeHtml(s){
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function greeting(){
  const h = new Date().getHours();
  if(h >= 5 && h < 12) return 'Good morning, Maya';
  if(h >= 12 && h < 17) return 'Good afternoon, Maya';
  if(h >= 17 && h < 22) return 'Good evening, Maya';
  return 'Good night, Maya';
}
function dateNoYear(d){
  return d.toLocaleDateString('en-US',{ weekday:'long', month:'long', day:'numeric' });
}
function sprigSVG(){
  return `<div class="deco-scatter">
    <svg class="deco-s1" viewBox="0 0 24 24"><path class="deco-c1" d="M12 0 C13 8, 16 11, 24 12 C16 13, 13 16, 12 24 C11 16, 8 13, 0 12 C8 11, 11 8, 12 0 Z"/></svg>
    <svg class="deco-s2" viewBox="0 0 24 24"><path class="deco-c2" d="M12 0 C13 8, 16 11, 24 12 C16 13, 13 16, 12 24 C11 16, 8 13, 0 12 C8 11, 11 8, 12 0 Z"/></svg>
    <svg class="deco-s3" viewBox="0 0 24 24"><path class="deco-c3" d="M12 0 C13 8, 16 11, 24 12 C16 13, 13 16, 12 24 C11 16, 8 13, 0 12 C8 11, 11 8, 12 0 Z"/></svg>
    <svg class="deco-s4" viewBox="0 0 24 24"><circle class="deco-c4" cx="12" cy="12" r="12"/></svg>
  </div>`;
}
function keyOf(d){
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

/* ============ THEME ============ */
function applyTheme(){
  const t = state.theme;
  const root = document.documentElement;
  root.style.setProperty('--header', t.header);
  root.style.setProperty('--ink', t.ink);
  root.style.setProperty('--accent', t.accent);
  if(t.dark){
    root.classList.add('dark-engine');
    root.style.setProperty('--appbg', '#171512');
    root.style.setProperty('--card', '#26221C');
    // In dark mode the ink (used for icons and fine detail) must be light to read
    // on dark cards; accent surfaces flip back to dark ink via CSS above.
    root.style.setProperty('--ink', '#EFE6D6');
  }else{
    root.classList.remove('dark-engine');
    root.style.setProperty('--appbg', t.appbg);
    root.style.setProperty('--card', t.card);
  }
  // Surface & nav: use the custom pick if set, otherwise auto-derive from the card
  if(t.surface){
    root.style.setProperty('--surface', t.surface);
  }else{
    root.style.setProperty('--surface', 'color-mix(in srgb, var(--card) 55%, var(--appbg))');
  }
  if(t.nav){
    root.style.setProperty('--navbg', t.nav);
  }else{
    root.style.setProperty('--navbg', 'var(--appbg)');
  }
}

/* ============ NAV ============ */
const TABS = [
  { id:'home', label:'Home', icon:'home' },
  { id:'food', label:'Food', icon:'utensils' },
  { id:'train', label:'Train', icon:'dumbbell' },
  { id:'prs', label:'PRs', icon:'trophy' },
  { id:'tasks', label:'Tasks', icon:'list-checks' },
  { id:'settings', label:'Settings', icon:'settings' }
];
let activeTab = 'home';
let prCategory = 'lift';
let trainMode = null;
let editingWorkoutId = null;
let pendingPR = null; // auto-detected record awaiting confirmation
let diarySearch = '';
let monthOffset = 0; // 0 = this month, -1 = last month, ...
let editingMealId = null;

function sparkline(values, color){
  if(!values.length || values.every(v=>v===0)) return '';
  const w = 260, h = 44, pad = 4;
  const max = Math.max(...values, 1);
  const step = values.length > 1 ? (w - pad*2) / (values.length - 1) : 0;
  const pts = values.map((v,i)=>{
    const x = pad + i * step;
    const y = h - pad - (v / max) * (h - pad*2);
    return [x, y];
  });
  // Smooth curve through the points
  let d = `M ${pts[0][0]} ${pts[0][1]}`;
  for(let i = 1; i < pts.length; i++){
    const [x0, y0] = pts[i-1];
    const [x1, y1] = pts[i];
    const cx = (x0 + x1) / 2;
    d += ` C ${cx} ${y0}, ${cx} ${y1}, ${x1} ${y1}`;
  }
  const area = d + ` L ${pts[pts.length-1][0]} ${h} L ${pts[0][0]} ${h} Z`;
  return `
    <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%; height:44px; display:block; margin-top:.4rem;">
      <defs>
        <linearGradient id="sparkFill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${color}" stop-opacity=".28" />
          <stop offset="100%" stop-color="${color}" stop-opacity="0" />
        </linearGradient>
      </defs>
      <path d="${area}" fill="url(#sparkFill)" />
      <path d="${d}" fill="none" stroke="${color}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
      ${pts.map(([x,y],i)=> i === pts.length-1 ? `<circle cx="${x}" cy="${y}" r="3.5" fill="${color}" />` : '').join('')}
    </svg>
  `;
}
function progressRing(value, target, color, label, unit = 'g'){
  const v = Number(value) || 0;
  const t = Number(target) || 0;
  const pct = t > 0 ? Math.max(0, Math.min(100, (v / t) * 100)) : 0;
  // Bounce only when a ring first reaches 100%, not on every render while complete.
  const done = pct >= 100;
  const celebrate = done && completedRings.get(label) !== true;
  completedRings.set(label, done);
  const r = 26;
  const circ = 2 * Math.PI * r;
  const offset = circ - (pct / 100) * circ;
  return `
    <div class="flex flex-col items-center gap-1.5 ${celebrate ? 'ring-done' : ''}" style="flex:1; min-width:0;">
      <div style="position:relative; width:66px; height:66px;">
        <svg width="66" height="66" style="transform:rotate(-90deg);">
          <circle cx="33" cy="33" r="${r}" fill="none" stroke="var(--surface)" stroke-width="6" />
          <circle cx="33" cy="33" r="${r}" fill="none" stroke="${color}" stroke-width="6"
            stroke-linecap="round"
            stroke-dasharray="${circ}"
            stroke-dashoffset="${offset}"
            style="transition:stroke-dashoffset .8s cubic-bezier(.22,1,.36,1);" />
        </svg>
        <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center;">
          <span class="ring-pct font-extrabold ink-text text-neutral-900" style="font-size:.78rem;">${pct >= 100 ? "✓" : Math.round(pct) + "%"}</span>
        </div>
      </div>
      <span class="font-extrabold ink-text text-neutral-900" style="font-size:.68rem; letter-spacing:.02em;">${label}</span>
      <span class="ink-text text-neutral-900" style="font-size:.62rem; opacity:.65; font-weight:600;">${fmt(value)}/${fmt(target)}${unit}</span>
    </div>
  `;
}

function bindHome(){
  const mPrev = document.getElementById('monthPrev');
  if(mPrev && !mPrev.disabled){
    mPrev.addEventListener('click', ()=>{ monthOffset--; render(); });
  }
  const mNext = document.getElementById('monthNext');
  if(mNext && !mNext.disabled){
    mNext.addEventListener('click', ()=>{ monthOffset = Math.min(0, monthOffset + 1); render(); });
  }
  document.querySelectorAll('.home-task').forEach(cb=>{
    cb.addEventListener('change', ()=>{
      const t = state.tasks.find(x=>x.id===cb.dataset.id);
      if(t){
        t.done = true;
        haptic([10, 25, 12]);
        toast('Task completed', 'check');
        saveState(); render();
      }
    });
  });
  document.querySelectorAll('.supp-check').forEach(cb=>{
    cb.addEventListener('change', ()=>{
      const tk = todayKey();
      if(!state.supplements.checked[tk]) state.supplements.checked[tk] = {};
      state.supplements.checked[tk][cb.dataset.name] = cb.checked;
      saveState();
    });
  });
}

function foodDayLabel(dateStr){
  if(dateStr === todayKey()) return 'Today';
  const parts = (dateStr||'').split('-').map(Number);
  if(parts.length!==3 || !parts[0]) return dateStr || '';
  const d = new Date(parts[0], parts[1]-1, parts[2]);
  return d.toLocaleDateString('en-US',{ weekday:'short', month:'short', day:'numeric' });
}

}
function bindFood(){
  // ---- Macro helper: generate a prompt, then parse whatever the AI replies ----
  const aiCopyBtn = document.getElementById('aiCopy');
  if(aiCopyBtn){
    aiCopyBtn.addEventListener('click', async ()=>{
      const desc = (document.getElementById('aiDesc').value || '').trim();
      if(!desc){ toast('Describe the meal first', 'circle-alert'); return; }
      const prompt = `Estimate the nutrition for this meal:\n"${desc}"\n\nReply with ONLY this, no other text:\nName: <short name>\nCalories: <number>\nProtein: <number>\nCarbs: <number>\nFat: <number>\n\nUse grams for protein, carbs and fat. Numbers only, no units.`;
      try{
        await navigator.clipboard.writeText(prompt);
        haptic(10);
        toast('Prompt copied — paste it in your AI', 'copy');
      }catch(err){
        // iOS can block the clipboard API. Fall back to a selectable field
        // so the prompt can still be copied by hand.
        const el = document.getElementById('aiPaste');
        if(el){
          el.value = prompt;
          el.focus();
          el.setSelectionRange(0, el.value.length);
        }
        toast('Copy the text below, then paste the reply back', 'circle-alert');
      }
    });
  }
  const aiFillBtn = document.getElementById('aiFill');
  if(aiFillBtn){
    aiFillBtn.addEventListener('click', ()=>{
      const raw = (document.getElementById('aiPaste').value || '').trim();
      if(!raw){ toast('Paste the AI reply first', 'circle-alert'); return; }
      // Pull the first number that follows each label, however the AI formatted it
      const grab = (labels) => {
        for(const label of labels){
          // Match: label, optional markdown/punctuation, then the first number.
          const re = new RegExp(label + String.raw`[^0-9\n]{0,12}([0-9]+(?:\.[0-9]+)?)`, 'i');
          const m = raw.match(re);
          if(m) return parseNum(m[1]);
        }
        return null;
      };
      const cal = grab(['calories', 'kcal', 'energy']);
      const p   = grab(['protein']);
      const c   = grab(['carbs', 'carbohydrates', 'carbohydrate']);
      const fat = grab(['fat', 'fats']);
      // Name: an explicit "Name:" line, else fall back to what was described
      let name = '';
      const nameMatch = raw.match(/name\s*[:=\-]?\s*\**\s*(.+)/i);
      if(nameMatch) name = nameMatch[1].replace(/\*/g, '').trim();
      if(!name) name = (document.getElementById('aiDesc').value || '').trim().slice(0, 60);

      if(cal === null && p === null && c === null && fat === null){
        toast("Couldn't read that — check the reply", 'circle-alert');
        return;
      }
      editingMealId = null;
      mealDraft = {
        name,
        cal: cal ?? '',
        p: p ?? '',
        c: c ?? '',
        f: fat ?? ''
      };
      haptic([10, 30, 14]);
      toast('Filled in — check and log', 'sparkles');
      render();
    });
  }

  const foodDateEl = document.getElementById('foodDate');
  if(foodDateEl){
    ['change','input','blur'].forEach(evt=>{
      foodDateEl.addEventListener(evt, ()=>{
        if(foodDateEl.value && foodDateEl.value !== selectedFoodDate){
          selectedFoodDate = foodDateEl.value;
          // Close any open meal editor: it belongs to the previous day
          editingMealId = null;
          mealDraft = {};
          render();
        }
      });
    });
  }
  const backBtn = document.getElementById('backToToday');
  if(backBtn){
    backBtn.addEventListener('click', ()=>{
      selectedFoodDate = todayKey();
      editingMealId = null;
      mealDraft = {};
      render();
    });
  }
  document.getElementById('mealForm').addEventListener('submit', e=>{
    e.preventDefault();
    const liveEl = document.getElementById('foodDate');
    if(liveEl && liveEl.value) selectedFoodDate = liveEl.value;
    const fk = selectedFoodDate || todayKey();
    if(!state.meals[fk]) state.meals[fk] = [];
    // One decimal is plenty for food; 12.45 g of carbs is false precision.
    const round1 = n => Math.round(n * 10) / 10;
    const values = {
      name: document.getElementById('mealName').value.trim(),
      cal: round1(parseNum(document.getElementById('mealCal').value)),
      p: round1(parseNum(document.getElementById('mealP').value)),
      c: round1(parseNum(document.getElementById('mealC').value)),
      f: round1(parseNum(document.getElementById('mealF').value))
    };
    if(editingMealId){
      const idx = state.meals[fk].findIndex(m => m.id === editingMealId);
      if(idx !== -1) state.meals[fk][idx] = Object.assign({}, state.meals[fk][idx], values);
      editingMealId = null;
      toast('Meal updated', 'check-circle-2');
    }else{
      state.meals[fk].push(Object.assign({ id: uid() }, values));
      toast('Meal logged', 'utensils');
    }
    mealDraft = {};
    saveState(); render();
  });
  document.querySelectorAll('.edit-meal').forEach(b=>{
    b.addEventListener('click', ()=>{
      const fk = selectedFoodDate || todayKey();
      const m = (state.meals[fk]||[]).find(x => x.id === b.dataset.id);
      if(!m) return;
      editingMealId = m.id;
      mealDraft = { name:m.name, cal:m.cal, p:m.p, c:m.c, f:m.f };
      render();
      const form = document.getElementById('mealForm');
      if(form){
        const top = form.getBoundingClientRect().top + window.scrollY - 90;
        window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
      }
    });
  });
  const cancelMeal = document.getElementById('cancelMealEdit');
  if(cancelMeal){
    cancelMeal.addEventListener('click', ()=>{
      editingMealId = null;
      mealDraft = {};
      render();
    });
  }
  document.querySelectorAll('.del-meal').forEach(b=>{
    b.addEventListener('click', ()=>{
      armDelete(b, ()=>{
        const fk = selectedFoodDate;
        if(editingMealId === b.dataset.id){ editingMealId = null; mealDraft = {}; }
        state.meals[fk] = (state.meals[fk]||[]).filter(m=>m.id!==b.dataset.id);
        if(!state.meals[fk].length) delete state.meals[fk];
        haptic([25, 40, 25]);
        toast('Meal deleted', 'trash-2');
        saveState(); render();
      });
    });
  });
  document.getElementById('waterForm').addEventListener('submit', e=>{
    e.preventDefault();
    const fk = selectedFoodDate || todayKey();
    const ml = parseNum(document.getElementById('waterMl').value);
    if(ml>0){
      state.water[fk] = (state.water[fk]||0) + ml;
      if(!state.waterLog[fk]) state.waterLog[fk] = [];
      state.waterLog[fk].push(ml);
      toast(`+${fmt(ml)} ml`, 'droplets');
      saveState(); render();
    }
  });
  const waterUndoBtn = document.getElementById('waterUndo');
  if(waterUndoBtn){
    waterUndoBtn.addEventListener('click', ()=>{
      const fk = selectedFoodDate || todayKey();
      const log = state.waterLog[fk];
      if(log && log.length){
        const last = log.pop();
        state.water[fk] = Math.max(0, (state.water[fk]||0) - last);
        if(!log.length) delete state.waterLog[fk];
        toast('Removed ' + fmt(last) + ' ml', 'undo-2');
      }else{
        // Older entries have no per-entry history, so there's nothing safe to undo.
        toast('Nothing to undo — use Reset day', 'circle-alert');
        return;
      }
      if(state.water[fk] === 0) delete state.water[fk];
      saveState(); render();
    });
  }
  const waterResetBtn = document.getElementById('waterReset');
  if(waterResetBtn){
    waterResetBtn.addEventListener('click', ()=>{
      const fk = selectedFoodDate || todayKey();
      delete state.water[fk];
      delete state.waterLog[fk];
      haptic([10, 25, 12]);
      toast('Hydration reset', 'rotate-ccw');
      saveState(); render();
    });
  }
  document.querySelectorAll('.food-day').forEach(b=>{
    b.addEventListener('click', ()=>{
      selectedFoodDate = b.dataset.date;
      editingMealId = null;
      mealDraft = {};
      render(true);
    });
  });
  const foodMoreBtn = document.getElementById('foodHistoryMore');
  if(foodMoreBtn){
    foodMoreBtn.addEventListener('click', ()=>{ foodDaysShown += 30; render(); });
  }
  const foodCollapseBtn = document.getElementById('foodHistoryCollapse');
  if(foodCollapseBtn){
    foodCollapseBtn.addEventListener('click', ()=>{ foodDaysShown = 7; render(); });
  }
}

/* ============ TRAIN ============ */
function paceString(totalSec, km){
  if(!km || km<=0 || !totalSec || totalSec<=0) return '—';
  const secPerKm = totalSec / km;
  const m = Math.floor(secPerKm/60);
  const s = Math.round(secPerKm % 60);
  const ss = s===60 ? 0 : s;
  const mm = s===60 ? m+1 : m;
  return mm + ':' + String(ss).padStart(2,'0') + ' /km';
}
function parseDuration(str){
  const s = String(str ?? '').trim();
  if(!s) return 0;
  const parts = s.split(':').map(p => parseNum(p));
  if(parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
  if(parts.length === 2) return parts[0]*60 + parts[1];
  if(parts.length === 1) return parts[0]*60; // bare number = minutes
  return 0;
}
function secondsToInput(totalSec){
  const s = Number(totalSec) || 0;
  if(!s) return '';
  const h = Math.floor(s/3600);
  const m = Math.floor((s%3600)/60);
  const sec = s % 60;
  const pad = n => String(n).padStart(2,'0');
  return h ? `${h}:${pad(m)}:${pad(sec)}` : `${m}:${pad(sec)}`;
}
function durationString(totalSec){
  const h = Math.floor(totalSec/3600);
  const m = Math.floor((totalSec%3600)/60);
  const s = Math.round(totalSec%60);
  return (h ? h + 'h ' : '') + m + 'm ' + s + 's';
}
function knownExercises(){
  const names = new Set();
  state.workouts.forEach(w=>{
    // New flat segment shape
    if(Array.isArray(w.segments)) w.segments.forEach(seg => (seg.items||[]).forEach(ex => ex.name && names.add(ex.name)));
    const p = w.phases || {};
    [p.warmups, p.mains, p.cools].forEach(group=>{
      if(Array.isArray(group)) group.forEach(blk => (blk.items||[]).forEach(ex => ex.name && names.add(ex.name)));
    });
    // legacy shapes
    [p.warmup, p.main, p.cool].forEach(items=>{
      if(Array.isArray(items)) items.forEach(ex => ex.name && names.add(ex.name));
    });
  });
  return [...names].sort();
}
// Colour a segment's label tag by keyword so rests, warm-ups and cool-downs
// read at a glance, while everything else gets the honey "work" tone.
function segColor(label){
  const l = (label || '').toLowerCase();
  if(/\brest\b|recover/.test(l))            return '#EAD9C6';
  if(/warm[\s-]?up|warmup/.test(l))         return '#DFE3C8';
  if(/cool[\s-]?down|cooldown|stretch/.test(l)) return '#D9D0E3';
  return '#F6E2AE';
}
// The displayed title = free-text label + the structured "Every X for Y sets"
// format (when set). Empty parts are dropped, so a half-filled Every never
// prints stray words. This is the single source of truth for a segment's title.
function segTitle(seg){
  let base = (seg.label || '').trim();
  const ev = seg.every;
  if(ev && (String(ev.interval || '').trim() || String(ev.sets || '').trim())){
    const iv = String(ev.interval || '').trim();
    const st = String(ev.sets || '').trim();
    const e = 'Every' + (iv ? ' ' + iv : '') + (st ? ' for ' + st + ' sets' : '');
    base = base ? base + ' — ' + e : e;
  }
  const it = seg.intervals;
  if(it && (String(it.reps || '').trim() || String(it.work || '').trim() || String(it.pace || '').trim())){
    const reps = String(it.reps || '').trim();
    const work = String(it.work || '').trim();
    const pace = String(it.pace || '').trim();
    let s = (reps && work) ? (reps + ' × ' + work) : (work || (reps ? reps + ' ×' : ''));
    if(pace) s += (s ? ' @ ' : '') + pace;
    if(s) base = base ? base + ' — ' + s : s;
  }
  return base;
}

      </span>
      ${moveDelControls}

      ${knownExercises().map(n=>`<option value="${escapeHtml(n)}"></option>`).join('')}
    </datalist>
    ${segDraft.map((seg,si)=>{

        <input class="field seg-detail" data-seg="${si}" type="text" placeholder="${isRun ? 'Time or pace (e.g. 13:08 or 6:34 /km — optional)' : 'Weight (e.g. 14 lbs, 30 kg, BW — optional)'}" />

        </div>
      </div>`;
    }).join('')}
    <button type="button" class="add-seg btn-accent w-full block py-2.5 font-extrabold text-xs ink-text" style="color:var(--ink);">+ Add segment</button>
  `;
}

  }else if(trainMode==='strength'){

  const q = diarySearch.trim().toLowerCase();
  const matches = (w) => {
    if(!q) return true;
    const hay = [];
    hay.push(w.title || '', w.notes || '', w.note || '', w.score || '', w.type || '');
    // New flat segment shape
    if(Array.isArray(w.segments)) w.segments.forEach(seg=>{
      hay.push(segTitle(seg));
      (seg.items||[]).forEach(ex => hay.push(ex.name||'', ex.reps||'', ex.weight||'', ex.pace||''));

    const p = w.phases || {};
    // New block shape
    [p.warmups, p.mains, p.cools].forEach(group=>{
      if(Array.isArray(group)) group.forEach(blk=>{
        hay.push(blk.name || '', blk.format || '', blk.cap || '');

      });
    });
    // Legacy flat shape — otherwise older workouts would be unsearchable
    [p.warmup, p.main, p.cool].forEach(items=>{
      if(Array.isArray(items)) items.forEach(ex => hay.push(ex.name||'', ex.reps||'', ex.weight||'', ex.detail||''));
    });
    return hay.join(' ').toLowerCase().includes(q);
  };
  const allWorkouts = [...state.workouts]
    .filter(matches)
    .sort((a,b)=> (b.date||'').localeCompare(a.date||'') || (b.created-a.created));
  const completedCount = allWorkouts.filter(w=>!w.planned).length;

  const sorted = allWorkouts;

    if(g) g.items.push(w); else groups.push({ date:w.date, items:[w] });
  });
  const visibleGroups = diarySearch.trim() ? groups : groups.slice(0, trainDaysShown);
  const hiddenDayCount = diarySearch.trim() ? 0 : groups.length - visibleGroups.length;
  const typeColor = { running:'#F6E2AE', crossfit:'#F5D3BD', strength:'#D9D0E3', accessory:'#DFE3C8' };
  const typeLabel = { running:'Run', crossfit:'CrossFit', strength:'Strength', accessory:'Skills' };
  function prettyDay(dateStr){

    const d = new Date(parts[0], parts[1]-1, parts[2]);
    const label = d.toLocaleDateString('en-US',{ weekday:'short', month:'short', day:'numeric' });
    return dateStr===todayKey() ? label + ' · Today' : label;
  }

  return `

    </div>

    <section class="card p-5 mb-5">
      ${sprigSVG()}
      <h2 class="display font-extrabold text-2xl ink-text text-neutral-900 mb-3">${editingWorkoutId ? 'Edit Workout' : (trainMode ? 'New ' + (trainMode==='running'?'Run':trainMode==='crossfit'?'CrossFit Session':trainMode==='strength'?'Strength Session':'Skills Work') : 'Choose a workout type')}</h2>

                ${g.items.map(w=>{

                        </div>
                      </div>
                      <div class="flex flex-wrap gap-1.5 mt-1">
                        <span class="tag" style="background:${typeColor[w.type] || '#EBD9C3'}; color:#4A3A26;">${typeLabel[w.type] || w.type}</span>
                        ${w.planned ? `<span class="tag" style="background:transparent; border:1.5px dashed color-mix(in srgb, var(--ink) 40%, transparent); color:#4A3A26;">◷ Planned</span>` : ''}
                      </div>
                      ${body}
                      ${(() => {
                        const exText = ex => `${escapeHtml(ex.name)}${ex.reps ? ' — ' + escapeHtml(ex.reps) : ''}${(ex.weight || ex.pace) ? ' @ ' + escapeHtml(ex.weight || ex.pace) : ''}${ex.rest ? ' · rest ' + escapeHtml(ex.rest) : ''}`;
                        const restLine = ex => `<div style="border-top:1.5px dashed color-mix(in srgb, var(--ink) 22%, transparent); border-bottom:1.5px dashed color-mix(in srgb, var(--ink) 22%, transparent); padding:.2rem 0; margin:.1rem 0;"><span class="text-xs font-extrabold ink-text text-neutral-900" style="text-transform:uppercase; letter-spacing:.05em; opacity:.6;">⏸ Rest${ex.dur ? ' ' + escapeHtml(ex.dur) : ''}</span></div>`;
                        // Group consecutive superset exercises so a chain reads as one linked pair.
                        // A rest row always stands alone and breaks any chain.
                        const renderItems = (items) => {
                          const chunks = [];
                          items.forEach(ex => {
                            const last = chunks[chunks.length - 1];

    b.addEventListener('click', ()=>{
      segDraft.push({ label: '', rounds: '', items: [] });
      haptic(8);
      render();
    });
  });
  document.querySelectorAll('.del-seg').forEach(b=>{
    b.addEventListener('click', ()=>{
      segDraft.splice(Number(b.dataset.index), 1);
      if(!segDraft.length) segDraft = freshSegDraft();
      render();
    });
  });
  document.querySelectorAll('.move-seg').forEach(b=>{
    b.addEventListener('click', ()=>{
      const i = Number(b.dataset.index);
      const j = i + Number(b.dataset.dir);
      if(j < 0 || j >= segDraft.length) return;
      [segDraft[i], segDraft[j]] = [segDraft[j], segDraft[i]];
      haptic(8);
      render();
    });
  });
  const searchEl = document.getElementById('diarySearch');
  if(searchEl){
    searchEl.addEventListener('input', ()=>{
      diarySearch = searchEl.value;
      render();
      // Restore focus and caret after the re-render
      const again = document.getElementById('diarySearch');
      if(again){ again.focus(); again.setSelectionRange(again.value.length, again.value.length); }
    });
  }
  const moreBtn = document.getElementById('historyMore');
  if(moreBtn){
    moreBtn.addEventListener('click', ()=>{ trainDaysShown += 30; render(); });
  }
  const collapseBtn = document.getElementById('historyCollapse');
  if(collapseBtn){
    collapseBtn.addEventListener('click', ()=>{ trainDaysShown = 7; render(); });
  }
}
function dmy(dateStr){
  const parts = (dateStr || '').split('-');
  if(parts.length !== 3) return dateStr || '';
  return parts[2] + '/' + parts[1] + '/' + parts[0];
}

        <div class="flex flex-col gap-2.5">
          ${list.map(p=>{
            // Find the previous record for the same exercise to show progression
            const sameName = list.filter(x => x.name.trim().toLowerCase() === p.name.trim().toLowerCase());
            const idxInSame = sameName.indexOf(p);
            const prev = sameName[idxInSame + 1]; // list is newest-first
            let delta = '';
            if(prev){
              // Parse a value into a comparable number. Times like 22:41 or 1:05:30
              // become total seconds; plain values (120 kg, 5 reps) become that number.
              const numOf = s => {
                const str = String(s).trim();
                if(str.includes(':')){
                  const parts = str.split(':').map(x=>{
                    const m = x.match(/\d+(\.\d+)?/);
                    return m ? parseFloat(m[0]) : 0;
                  });
                  if(parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
                  if(parts.length === 2) return parts[0]*60 + parts[1];
                }
                const m = str.match(/-?\d+(\.\d+)?/);
                return m ? parseFloat(m[0]) : null;
              };
              const isTime = String(p.value).includes(':') || String(prev.value).includes(':');
              const a = numOf(p.value), b = numOf(prev.value);
              if(a !== null && b !== null && a !== b){
                const up = a > b;
                // Lower is better for times (running, or any timed record); higher for lifts/reps
                const lowerIsBetter = prCategory === 'running' || isTime;
                const better = lowerIsBetter ? !up : up;
                const diff = Math.abs(a - b);
                // Show a time difference in mm:ss, otherwise a plain number
                let shown;
                if(isTime){
                  const mm = Math.floor(diff / 60), ss = Math.round(diff % 60);
                  shown = mm ? `${mm}:${String(ss).padStart(2,'0')}` : `${ss}s`;
                }else{
                  shown = Number.isInteger(diff) ? diff : diff.toFixed(1);
                }
                delta = `<span class="tag mt-1" style="background:${better ? '#DFE3C8' : '#F5D3BD'}; color:#4A3A26;">${better ? '▲' : '▼'} ${shown} vs previous</span>`;
              }
            }
            return `
            <div class="sticky-row rounded-2xl px-4 py-3 flex flex-row items-center justify-between gap-2" style="background:var(--surface);">
              <div class="flex flex-col min-w-0">

                <span class="text-xs font-bold ink-text text-neutral-900">${dmy(p.date)}</span>
                ${delta}
              </div>
              <div class="flex flex-row items-center gap-2 flex-shrink-0">
                <span class="tag" style="background:#F3D391; color:#4A3A26;">${escapeHtml(p.value)}</span>
                <button class="del-pr pill px-2 py-1" data-id="${p.id}" style="background:#F5D3BD;">
                  <i data-lucide="trash-2" class="w-3.5 h-3.5" style="color:#4A3A26;"></i>
                </button>
              </div>
            </div>
          `;
          }).join('')}
        </div>
      ` : `<div class="flex flex-col items-center text-center py-4 gap-2"><i data-lucide="trophy" class="w-8 h-8" style="color:var(--accent);"></i><p class="font-extrabold text-sm ink-text text-neutral-900">No records yet</p><p class="text-xs font-bold ink-text text-neutral-900" style="opacity:.7;">Time to chase one.</p></div>`}
    </section>
  `;
}

function bindTasks(){
  document.getElementById('taskForm').addEventListener('submit', e=>{
    e.preventDefault();
    const raw = document.getElementById('taskCat').value.trim();
    if(!raw) return;
    // Merge with an existing category if it matches case-insensitively
    const existing = [...new Set(state.tasks.map(t=>t.category))]
      .find(c => c.toLowerCase() === raw.toLowerCase());
    const cat = existing || raw;
    // Give a brand-new category a colour from the palette rotation
    if(!state.taskColors[cat]){
      const palette = ['#F5D3BD','#F6E2AE','#DFE3C8','#B7A4D9','#E9A0B0','#EBD9C3'];
      const used = Object.keys(state.taskColors).length;
      state.taskColors[cat] = palette[used % palette.length];
    }
    state.tasks.push({
      id: uid(),
      category: cat,
      text: document.getElementById('taskText').value.trim(),
      done: false
    });
    selectedTaskCat = cat;
    toast('Task added', 'circle-plus');
    saveState(); render();
  });
  document.querySelectorAll('.pick-cat').forEach(b=>{
    b.addEventListener('click', ()=>{
      selectedTaskCat = b.dataset.cat;
      render();
    });
  });
  document.querySelectorAll('.cat-color').forEach(inp=>{
    inp.addEventListener('change', ()=>{
      state.taskColors[inp.dataset.cat] = inp.value;
      saveState(); render();
    });
  });
  document.querySelectorAll('.task-check').forEach(cb=>{
    cb.addEventListener('change', ()=>{
      const t = state.tasks.find(x=>x.id===cb.dataset.id);
      if(t){ t.done = cb.checked; saveState(); render(); }
    });
  });
  document.querySelectorAll('.del-task').forEach(b=>{
    b.addEventListener('click', ()=>{
      state.tasks = state.tasks.filter(t=>t.id!==b.dataset.id);
      saveState(); render();
    });
  });
  document.querySelectorAll('.clear-done').forEach(b=>{
    b.addEventListener('click', ()=>{
      const cat = b.dataset.cat;
      state.tasks = state.tasks.filter(t=>!(t.category===cat && t.done));
      saveState(); render();
    });
  });
}

        <h2 class="display font-extrabold text-2xl ink-text text-neutral-900">Data Backup</h2>
      </div>
      <div class="flex flex-col gap-3.5 w-full max-w-full">
        <button id="exportBtn" class="btn-accent w-full max-w-full block py-3 font-extrabold ink-text" style="color:var(--ink);">Export JSON</button>
        <label class="btn-accent w-full max-w-full block py-3 font-extrabold text-center cursor-pointer ink-text" style="color:var(--ink);">
          Import JSON
          <input type="file" id="importInput" accept="application/json" class="hidden" />
        </label>
      </div>
    </section>
  `;
}
function bindSettings(){
  document.getElementById('targetsForm').addEventListener('submit', e=>{
    e.preventDefault();
    state.targets = {
      calories: parseNum(document.getElementById('tgCal').value),
      protein: parseNum(document.getElementById('tgP').value),
      carbs: parseNum(document.getElementById('tgC').value),
      fat: parseNum(document.getElementById('tgF').value),
      water: parseNum(document.getElementById('tgW').value)
    };
    toast('Targets saved', 'target');
    saveState(); render();
  });
  document.getElementById('suppForm').addEventListener('submit', e=>{
    e.preventDefault();
    const name = document.getElementById('suppName').value.trim();
    if(name && !state.supplements.list.includes(name)){
      state.supplements.list.push(name);
      saveState(); render();
    }
  });
  document.querySelectorAll('.del-supp').forEach(b=>{
    b.addEventListener('click', ()=>{
      state.supplements.list.splice(Number(b.dataset.index), 1);
      saveState(); render();
    });
  });
  document.querySelectorAll('.theme-color').forEach(inp=>{
    inp.addEventListener('input', ()=>{
      state.theme[inp.dataset.key] = inp.value;
      saveState(); applyTheme();
    });
  });
  document.querySelectorAll('.reset-auto').forEach(b=>{
    b.addEventListener('click', ()=>{
      state.theme[b.dataset.key] = '';
      saveState(); applyTheme(); render();
    });
  });
  document.querySelectorAll('.preset-theme').forEach(b=>{
    b.addEventListener('click', ()=>{
      const p = PRESETS[Number(b.dataset.preset)];
      if(!p) return;
      const wasDark = state.theme.dark;
      state.theme = Object.assign({}, state.theme, {
        header: p.header, appbg: p.appbg, card: p.card, ink: p.ink, accent: p.accent,
        surface: '', nav: '', dark: wasDark
      });
      haptic([10, 25, 12]);
      toast(p.name + ' palette applied', 'palette');
      saveState(); applyTheme(); render();
    });
  });
  document.getElementById('resetTheme').addEventListener('click', ()=>{
    const wasDark = state.theme.dark;
    state.theme = Object.assign({}, DEFAULT_THEME, { dark: wasDark });
    saveState(); applyTheme(); render();
  });
  document.getElementById('darkToggle').addEventListener('click', ()=>{
    state.theme.dark = !state.theme.dark;
    saveState(); applyTheme(); render();
  });
  document.getElementById('exportBtn').addEventListener('click', ()=>{
    const blob = new Blob([JSON.stringify(state, null, 2)], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'wodiary-backup.json';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  });
  document.getElementById('importInput').addEventListener('change', e=>{
    const file = e.target.files[0];
    if(!file) return;
    // Import REPLACES everything. Warn first if there's anything to lose.
    const hasData = state.workouts.length || state.prs.length || state.tasks.length ||
                    Object.keys(state.meals).length || state.supplements.list.length;
    if(hasData){
      const ok = window.confirm(
        'Import will REPLACE all your current data — workouts, meals, records and tasks.\n\n' +
        'Export a backup first if you want to keep it.\n\nContinue?'
      );
      if(!ok){ e.target.value = ''; return; }
    }
    const reader = new FileReader();
    reader.onload = ev=>{
      try{
        const imported = JSON.parse(ev.target.result);
        state = Object.assign({}, state, imported);
        // Apply the same guards as loadState — a partial or older backup must not
        // leave nested objects half-filled (e.g. targets with only "calories").
        state.theme = Object.assign({}, DEFAULT_THEME, imported.theme || {});
        state.targets = Object.assign({}, { calories:2200, protein:140, carbs:230, fat:70, water:2500 }, imported.targets || {});
        state.supplements = Object.assign({ list:[], checked:{} }, imported.supplements || {});
        state.taskColors = Object.assign({}, imported.taskColors || {});
        state.waterLog = Object.assign({}, imported.waterLog || {});
        state.meals = imported.meals || {};
        state.water = imported.water || {};
        state.workouts = Array.isArray(imported.workouts) ? imported.workouts : [];
        state.prs = Array.isArray(imported.prs) ? imported.prs : [];
        state.tasks = Array.isArray(imported.tasks) ? imported.tasks : [];
        migrateTheme();
        lastCounterValues.clear();
        completedRings.clear();
        toast('Data imported', 'check-circle-2');
        saveState(); applyTheme(); render(true);
      }catch(err){
        alert('Import failed: that file is not valid WODiary JSON.');
      }
    };
    reader.readAsText(file);
  });
}

/* ============ MASTER RENDER ============ */
// scrollToTop: true only when moving to a different tab. In-place updates
// (adding an exercise, ticking a box) keep the user where they were.
function render(scrollToTop = false){
  const y = window.scrollY;
  // Preserve anything currently typed in the Train form. Re-rendering (e.g. after
  // adding an exercise) rebuilds the inputs, which would otherwise clear them.
  if(activeTab === 'train'){
    const grab = id => { const el = document.getElementById(id); return el ? el.value : undefined; };
    const live = {
      title: grab('wodName') ?? grab('strTitle') ?? grab('accName'),
      score: grab('wodScore'),
      notes: grab('wodNotes') ?? grab('strNotes') ?? grab('accNotes'),
      note: grab('runNote'),
      dist: grab('runDist'),
      h: grab('runH'), m: grab('runM'), s: grab('runS')
    };
    Object.keys(live).forEach(k => {
      if(live[k] !== undefined && live[k] !== '') editFields[k] = live[k];
    });
  }
  const view = document.getElementById('view');
  // Only play the entrance animation on a genuine view change (tab switch),
  // never on in-place updates like ticking a checkbox.
  view.classList.toggle('view-enter', !!scrollToTop);
  if(activeTab==='home'){ view.innerHTML = renderHome(); bindHome(); }
  else if(activeTab==='food'){ view.innerHTML = renderFood(); bindFood(); }
  else if(activeTab==='train'){ view.innerHTML = renderTrain(); bindTrain(); }
  else if(activeTab==='prs'){ view.innerHTML = renderPRs(); bindPRs(); }
  else if(activeTab==='tasks'){ view.innerHTML = renderTasks(); bindTasks(); }
  else if(activeTab==='settings'){ view.innerHTML = renderSettings(); bindSettings(); }
  renderNav();
  if(scrollToTop){
    window.scrollTo(0, 0);
  }else{
    window.scrollTo(0, y);
  }
  refreshIcons();
  animateCounters();
}

/* ============ INIT ============ */
function init(){
  loadState();
  applyTheme();
  render();
  // iOS keyboard fix: when an input loses focus, nudge the scroll position
  // so fixed elements (the bottom nav) re-anchor to the real viewport bottom.
  window.addEventListener('focusout', ()=>{
    setTimeout(()=>{ window.scrollTo(window.scrollX, window.scrollY); }, 60);
  });
  // Detect a day change (midnight, or the app waking after being backgrounded)
  // and refresh so the date, supplements checklist and "today" totals are correct.
  let lastSeenDay = todayKey();
  function checkDayRollover(){
    const now = todayKey();
    if(now !== lastSeenDay){
      lastSeenDay = now;
      selectedFoodDate = now;
      selectedTrainDate = now;
      lastCounterValues.clear();
      completedRings.clear();
      render();
    }
  }
  setInterval(checkDayRollover, 30000);
  // iOS suspends timers when the app is backgrounded, so also check on wake
  document.addEventListener('visibilitychange', ()=>{
    if(!document.hidden) checkDayRollover();
  });
  window.addEventListener('focus', checkDayRollover);
  refreshIcons();
}
init();

});
</script>
